version: 2

models:
  - name: stg_local_bike__customers
    description: "Liste des clients"

    columns:
      - name: customer_id
        description: "Identifiant du client"
        tests:
          - not_null
          - unique

  - name: stg_local_bike__order_item
    description: "Détail des produit commandés par commandes"

    columns:
      - name: order_id
        description: "Identifiant de la commande"

      - name: item_id
        description: "Identifiant de l'item"
        tests:
          - not_null
    
      - name: product_id
        description: "Identifiant du produit."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__products')
                field: product_id

  - name: stg_local_bike__orders
    description: "Liste des commandes"
    columns:
      - name: order_id
        description: "Identifiants des produits"
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Identifiant des clients"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__customers')
                field: customer_id


      - name: order_status
        description: "Statut de la commande"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__brands')
                field: brand_id

      - name: staff_id
        description: "Identifiants du vendeur"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__staffs')
                field: staff_id
      - name: store_id
        description: "Identifiants du magasin"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__stores')
                field: store_id

  - name: stg_local_bike__staffs
    description: "Liste des vendeurs"

    columns:
      - name: staff_id
        description: "Identitifant du vendeur"
        tests:
          - not_null
          - unique

      - name: store_id
        description: "Identifiant du magasin"
        tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('stg_local_bike__stores')
                field: store_id

  - name: stg_local_bike__stores
    description: "Liste des magasins"

    columns:
      - name: store_id
        description: "Identitifant du magasin"
        tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('stg_local_bike__stores')
                field: store_id

