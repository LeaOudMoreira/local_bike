version: 2

models:
  - name: stg_local_bike__brands
    description: "Liste des différentes marques"

    columns:
      - name: brand_name
        description: "nom des marques existantes"

      - name: brand_id
        description: "Identifiant de la marque."
        tests:
          - not_null
          - unique

  - name: stg_local_bike__categories
    description: "Liste des différentes catégories de produits"

    columns:
      - name: category_name
        description: "nom des catégories produits existantes"

      - name: category_id
        description: "Identifiant de la catégorie."
        tests:
          - not_null
          - unique

  - name: stg_local_bike__products
    description: "Liste des produits"

    columns:
      - name: product_id
        description: "Identifiants des produits"
        tests:
          - not_null
          - unique

      - name: product_name
        description: "Nom des produits"
        tests:
          - not_null
          - unique
      - name: brand_id
        description: "Identifiants de la marque"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__brands')
                field: brand_id

      - name: category_id
        description: "Identifiants de la catégorie produit"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__categories')
                field: category_id

      - name: model_year
        description: "Année du modèle"
  
      - name: list_price
        description: "Prix du produit"
        tests:
          - not_null

  - name: stg_local_bike__stocks
    description: "Quantité de stock de chaque produit dans chaque magasin"

    columns:
      - name: store_id
        description: "Identitifant du magasin"
        tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('stg_local_bike__stores')
                field: store_id

      - name: product_id
        description: "Identifiant du produit"
        tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('stg_local_bike__products')
                field: product_id

          




